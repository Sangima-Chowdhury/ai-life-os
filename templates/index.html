<!DOCTYPE html>
<html>
<head>
    <title>AI Life OS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            max-width: 1000px;
            margin: auto;
            padding: 40px;
        }

        h1 {
            text-align: center;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
<select name="category">

    <option value="career">
        Career
    </option>

    <option value="productivity">
        Productivity
    </option>

    <option value="relationships">
        Relationships
    </option>

    <option value="health">
        Health
    </option>

    <option value="bussiness">
        Bussiness
    </option>
</select>

select {
    padding: 12px;
    border-radius: 10p;
    border: none;
    font-size: 16px;
}

        textarea {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            min-height: 180px;
        }

        button {
            background: linear-gradient(135deg,#3b82f6,#8b5cf6);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .response {
            margin-top: 30px;
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            line-height: 1.8;
            overflow-wrap: break-word;
        }

        .response h1
        .response h2
        .response h3 {
            color: #60a5fa;
        }

        .response ul,
        .response ol {
            padding-left: 25px;
        }

        .response p {
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 30px;
        }
    </style>
</head>

<body>

    <h1>🧠 AI Life OS</h1>

    <p class="subtitle">
        Your personal AI coach for life, career, productivity and growth.
    </p>

    <form method="POST">

        <textarea
            name="problem"
            placeholder="Describe your challenge here..."
            required></textarea>

        <button type="submit">
            Generate AI Action Plan
        </button>

    </form>

    {% if ai_response %}
        <div class="response">
            {{ ai_response | safe }}
        </div>
    <form action="/download-pdf" method="POST">
    <input type="hidden" name="plan_text" value="{{ ai_response }}">
    <button type="submit">Download PDF</button>
</form>
{% endif %}

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Login - AI Life OS</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .auth-card {
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: bold;
        }

        .bottom-text {
            text-align: center;
            margin-top: 20px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Log in to continue your AI Life OS journey.</p>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <p class="bottom-text">
            New here?
            <a href="/register">Create an account</a>
        </p>
    </div>

</body>
</html>
